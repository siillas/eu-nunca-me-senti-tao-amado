<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Generator</title>

<!-- biblioteca para exportar imagem -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<!-- fonte elegante -->
<link href="https://fonts.googleapis.com/css2?family=Monsieur+La+Doulaise&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  background: #0d0d0d;
  color: white;
  font-family: Arial;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.controls {
  margin: 20px;
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  justify-content: center;
}

.canvas {
  position: relative;
  width: 320px;
  height: 320px;
  background: #000;
  overflow: hidden;
  border-radius: 10px;
}

.canvas img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.texto {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-family: 'Monsieur La Doulaise', cursive;
  font-size: 60px;
  color: white;
  text-align: center;
  pointer-events: none;
}

button, input {
  padding: 10px;
  border: none;
  border-radius: 6px;
}
</style>
</head>

<body>

<div class="controls">
  <input type="file" id="upload">
  <input type="text" id="textoInput" placeholder="digita aqui">
  <input type="color" id="cor" value="#ffffff">
  <button onclick="baixar()">baixar</button>
</div>

<div class="canvas" id="area">
  <img id="imagem">
  <div class="texto" id="texto">amor</div>
</div>

<script>
const upload = document.getElementById("upload");
const imagem = document.getElementById("imagem");
const textoInput = document.getElementById("textoInput");
const texto = document.getElementById("texto");
const cor = document.getElementById("cor");

// upload da imagem
upload.addEventListener("change", function() {
  const file = this.files[0];
  if (file) {
    const reader = new FileReader();
    reader.onload = function(e) {
      imagem.src = e.target.result;
    };
    reader.readAsDataURL(file);
  }
});

// texto
textoInput.addEventListener("input", () => {
  texto.textContent = textoInput.value || "amor";
});

// cor
cor.addEventListener("input", () => {
  texto.style.color = cor.value;
});

// baixar imagem
function baixar() {
  html2canvas(document.getElementById("area")).then(canvas => {
    const link = document.createElement("a");
    link.download = "arte.png";
    link.href = canvas.toDataURL();
    link.click();
  });
}
</script>

</body>
</html>
