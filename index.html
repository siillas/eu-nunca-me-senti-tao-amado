<!DOCTYPE html> 
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="color-scheme" content="light only">
<title>S&M GENERATOR</title>

<link href="https://fonts.googleapis.com/css2?family=Monsieur+La+Doulaise&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond&display=swap" rel="stylesheet">

<link rel="icon" type="image/png" href="favicon/favicon-96x96.png?v=v1" sizes="96x96" />
<link rel="icon" type="image/svg+xml" href="favicon/favicon.svg?v=v1" />
<link rel="shortcut icon" href="favicon/favicon.ico?v=v1" />
<link rel="apple-touch-icon" sizes="180x180" href="favicon/apple-touch-icon.png?v=v1" />
<meta name="apple-mobile-web-app-title" content="S&M" />
<link rel="manifest" href="favicon/site.webmanifest?v=v1" />
<meta name="theme-color" content="#0b0b0b" />

<style>
:root {
  color-scheme: light;
}

body {
  margin: 0;
  background: linear-gradient(
    135deg,
    #5f6f7a 0%,
    #7f8f99 25%,
    #aebbc4 50%,
    #d6c7a1 75%,
    #f2e6c9 100%
  );
  color: white;
  font-family: 'Cormorant Garamond', serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  gap: 20px;
  padding: 24px 16px;
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

html {
  height: 100%;
  color-scheme: light !important;
}

.container {
  display: flex;
  gap: 30px;
  flex-wrap: wrap;
  justify-content: center;
  align-items: center;
  width: fit-content;
  min-width: 0;
  max-width: 1100px;
  margin: 0 auto;
  background: rgba(20, 25, 30, 0.45);
  padding: 25px;
  border-radius: 20px;
  backdrop-filter: blur(16px);
  box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  animation: fadeUp 0.8s ease;
}

.controls {
  display: flex;
  flex-direction: column;
  gap: 22px;
  width: 220px;
}

html, body {
   margin: 0;
   background: linear-gradient(
    135deg,
    #5f6f7a 0%,
    #7f8f99 25%,
    #aebbc4 50%,
    #d6c7a1 75%,
    #f2e6c9 100%
  );
}

* {
  forced-color-adjust: none;
}

.section {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

label {
  font-size: 11px;
  opacity: 0.65;
  letter-spacing: 0.8px;
}

.btn-download {
  margin-top: 10px;

  font-size: 18px;
  font-weight: 600;
  letter-spacing: 1px;

  padding: 14px;
  border-radius: 14px;

  background: linear-gradient(
    135deg,
    rgba(255,255,255,0.15),
    rgba(255,255,255,0.05)
  );

  border: 1px solid rgba(255,255,255,0.3);

  backdrop-filter: blur(10px);

  color: white;

  transition: all 0.25s ease;
}

.canvas {
  position: relative;
  width: 400px;
  height: 400px;
  background: #0b0b0b;
  overflow: hidden;
  border-radius: 14px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.8);
  filter: saturate(1.05) contrast(1.05);
  touch-action: none;
}

.color-palette {
  display: flex;
  gap: 6px;
}

.color-palette div {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  cursor: pointer;
  border: 1px solid rgba(255,255,255,0.4);
}

.canvas img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transform-origin: center;
  will-change: transform;
  cursor: grab;
  transition: transform 0.05s linear;
}

.canvas img:active {
  cursor: grabbing;
}

.texto {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-family: 'Monsieur La Doulaise', cursive;
  font-size: 80px;
  color: white;
  text-align: center;
  cursor: grab;
  user-select: none;
  line-height: 0.9;
  white-space: pre-line;
  text-shadow: 0 0 15px rgba(255, 180, 120, 0.4);
}

.texto.ativo {
  outline: 1.5px dashed rgba(255,255,255,0.5);
  outline-offset: 6px;
  cursor: grabbing;
}

.texto.ativo::after {
  box-shadow: 0 0 20px rgba(255,255,255,0.15);
}

.guia-horizontal,
.guia-vertical {
  position: absolute;
  background: rgba(255,255,255,0.25);
  pointer-events: none;
  display: none;
}

#textoInput {
  font-size: 14px;
  letter-spacing: 0.3px;
}

.upload-btn {

  display: flex;
  align-items: center;
  justify-content: center;

  width: 100%;

  padding: 14px;

  border-radius: 14px;

  background: linear-gradient(
    135deg,
    rgba(255,255,255,0.15),
    rgba(255,255,255,0.05)
  );

  border: 1px solid rgba(255,255,255,0.3);

  backdrop-filter: blur(10px);

  color: white;

  font-size: 15px;
  font-weight: 600;
  letter-spacing: 0.5px;

  cursor: pointer;

  transition: all 0.25s ease;

  box-shadow:
    0 4px 18px rgba(0,0,0,0.15),
    inset 0 1px 0 rgba(255,255,255,0.08);
}

.upload-btn:hover {

  background: linear-gradient(
    135deg,
    rgba(255,255,255,0.22),
    rgba(255,255,255,0.08)
  );

  border-color: rgba(255,255,255,0.45);

  transform: translateY(-1px);

  box-shadow:
    0 8px 24px rgba(0,0,0,0.22),
    inset 0 1px 0 rgba(255,255,255,0.1);
}

.upload-btn:active {

  transform: scale(0.98);
}

input[type="range"] {
  -webkit-appearance: none;
  appearance: none;
  height: 3px;
  background: rgba(255,255,255,0.15);
  border-radius: 10px;
}

input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: white;
  box-shadow: 0 0 8px rgba(255,255,255,0.4);
}

/* bolinha */
input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: white;
  cursor: pointer;
  border: none;
}

input[type="range"]::-moz-range-thumb {
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: white;
  border: none;
  cursor: pointer;
}
.guia-horizontal {
  top: 50%;
  left: 0;
  width: 100%;
  height: 1px;
}

.guia-vertical {
  left: 50%;
  top: 0;
  width: 1px;
  height: 100%;
}

.color-wrapper {
  display: flex;
  align-items: center;
  gap: 12px;
}

.color-preview {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  cursor: pointer;
  border: 2px solid rgba(255,255,255,0.5);

  background: conic-gradient(
    red,
    orange,
    yellow,
    lime,
    cyan,
    blue,
    violet,
    red
  );

  box-shadow: 
    0 0 10px rgba(0,0,0,0.3),
    0 0 20px rgba(255,255,255,0.1) inset;

  transition: all 0.2s ease;
}

.color-preview:hover {
  transform: scale(1.08);
}

input[type="color"] {
  opacity: 0;
  position: absolute;
  pointer-events: none;
}

input {
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
  color: white;
  backdrop-filter: blur(6px);
  padding: 10px;
  border-radius: 10px;
  font-family: inherit;
}

input::placeholder {
  color: rgba(255,255,255,0.5);
}

button {
  cursor: pointer;
  font-family: inherit;
}

input[type="range"] {
  accent-color: rgba(255,255,255,0.8);
}

button {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.2);
  backdrop-filter: blur(6px);
  letter-spacing: 0.5px;
  transition: all 0.2s ease;
  color: white;
}

button:hover {
  background: rgba(255,255,255,0.1);
  border-color: rgba(255,255,255,0.6);
}

.format-buttons {
  display: flex;
  gap: 5px;
}

.format-buttons button {
  flex: 1;
  padding: 10px;
  border-radius: 999px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.2);
  color: white;
  backdrop-filter: blur(6px);
  transition: all 0.2s ease;
}

.format-buttons button.active {
  background: rgba(255,255,255,0.22);
  border-color: rgba(255,255,255,0.7);

  box-shadow:
    0 0 18px rgba(255,255,255,0.08),
    inset 0 0 12px rgba(255,255,255,0.06);
}

.header-box {
  background: rgba(20, 25, 30, 0.6);
  backdrop-filter: blur(14px);

  padding: 14px 18px;
  border-radius: 12px;

  text-align: center;
  color: white;

  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
  width: 100%;
  max-width: 480px;

  flex: 0 0 auto;
}

.header-box h1 {
  margin: 0;
  font-size: clamp(30px, 2.6vw, 36px);
  white-space: nowrap;
  max-width: 100%;
  padding-left: 24px;
  padding-right: 24px;
  font-family: 'Monsieur La Doulaise', cursive;
  font-weight: normal;
  letter-spacing: 1px;
}

.header-box p {
  margin: 6px 0 0;
  font-size: 12px;
  opacity: 0.8;
  line-height: 1.4;
}

.header-wrapper {
  display: flex;
  align-items: center;
  justify-content: center;

  gap: 40px;

  width: 100%;
  max-width: 1100px;

  margin: 0 auto;
}

.header-img {
  height: 100%;
  max-height: 180px;
  aspect-ratio: 1 / 1;

  object-fit: cover;
  border-radius: 12px;

  display: block;

  opacity: 0.9;
  box-shadow: 0 10px 30px rgba(0,0,0,0.25);
}

* {
  box-sizing: border-box;
}

@media (max-width: 768px) and (orientation: landscape) {

  body {
    align-items: center;
    padding: 10px;
    gap: 12px;
    padding-left: 12px;
    padding-right: 12px;
  }

  .container {
    flex-direction: column;
    width: 100%;
    box-sizing: border-box;
    padding: 15px;
    gap: 20px;
    border: 1px solid rgba(255,255,255,0.08);
  }

  .controls {
    width: 100%;
    max-width: 240px;
  }

  .canvas {
    width: 100%;
  }

  .texto {
    font-size: 60px;
  }

  .header-wrapper {
    display: grid;
    grid-template-areas:
      "left right"
      "box box";
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    width: 100%;
    max-width: 400px;
    margin: 0 auto;
  }

  .header-img.left {
    grid-area: left;
  }

  .header-img.right {
    grid-area: right;
  }

  .header-box {
    grid-area: box;
    width: 100%;
  }

  .header-img {
    width: 100%;
    aspect-ratio: 3 / 4;
  }

  .header-box h1 {
    font-size: 24px;
  }

  .header-box p {
    font-size: 11px;
  }

}

@media (max-width: 768px) and (orientation: portrait) {

  .header-wrapper {
    display: grid;
    grid-template-areas:
      "left right"
      "box box";

    grid-template-columns: 1fr 1fr;

    gap: 12px;

    width: 100%;
    max-width: 360px;
    margin: 0 auto;
  }

  .header-img.left {
    grid-area: left;
  }

  .header-img.right {
    grid-area: right;
  }

  .header-box {
    grid-area: box;
    width: 100%;
    padding: 16px;
  }

  .header-img {
    width: 100%;
    aspect-ratio: 3 / 4;
  }

  .header-box h1 {
    font-size: clamp(24px, 6.5vw, 30px);
    line-height: 1.15;
    letter-spacing: 0.5px;
    text-align: center;
  }

   .container {
    width: 100%;
    max-width: 100%;
    box-sizing: border-box;
  }

@keyframes fadeUp {
  from {
    opacity: 0;
    transform: translateY(18px);
  }

  to {
    opacity: 1;
    transform: translateY(0);
  }
}
}

</style>
</head>

<body>

<div class="header-wrapper">

  <img src="img/left.png" class="header-img left">

  <div class="header-box">
    <h1 class="titulo">Eu nunca me senti tão amado</h1>
    <p>
      selecione uma foto.<br>
      escreva seu texto.<br>
      ajuste posição e tamanho.<br>
      escolha o formato.<br>
      baixe sua arte.
    </p>
  </div>

  <img src="img/right.png" class="header-img right">

</div>

<div class="container">

  <div class="controls">

  <div class="section">

  <label for="upload" class="upload-btn">
    ✦ escolher foto
  </label>

  <input
    type="file"
    id="upload"
    accept="image/*"
    hidden
  >

</div>

  <div class="section">
    <input type="text" id="textoInput" placeholder="digite aqui">
  </div>

  <!-- cor -->
  <div class="section">
    <label>cor do texto</label>

    <div class="color-wrapper">
      <div class="color-preview" onclick="document.getElementById('cor').click()"></div>

      <div class="color-palette">
        <div style="background:#ffffff" onclick="setColor('#ffffff')"></div>
        <div style="background:#000000" onclick="setColor('#000000')"></div>
        <div style="background:#f2e6c9" onclick="setColor('#f2e6c9')"></div>
        <div style="background:#d6c7a1" onclick="setColor('#d6c7a1')"></div>
        <div style="background:#5f6f7a" onclick="setColor('#5f6f7a')"></div>
        <div style="background:#916133" onclick="setColor('#916133')"></div>
      </div>

      <input type="color" id="cor" value="#ffffff">
    </div>
  </div>

    <div class="section">
      <label>tamanho do texto</label>
      <input type="range" id="tamanho" min="20" max="200" value="80">
    </div>

    <div class="section">
      <label>zoom da imagem</label>
      <input type="range" id="zoom" min="1" max="3" step="0.1" value="1">
    </div>

   <div class="section">
  <label>formato</label>
  <div class="format-buttons">
    <button onclick="setFormat(event, 'square')" class="active">quadrado (1:1)</button>
    <button onclick="setFormat(event, 'portrait')">retrato (4:5)</button>
    <button onclick="setFormat(event, 'story')">story (9:16)</button>
  </div>
</div>

    <button class="btn-download" onclick="baixar()">baixar</button>

  </div>

  <div class="canvas" id="area">
    <img id="imagem">
    <div class="guia-horizontal" id="gh"></div>
    <div class="guia-vertical" id="gv"></div>
    <div class="texto" id="texto">amor</div>
  </div>

</div>

<script>
let imgOffsetX = 0;
let imgOffsetY = 0;

let isDraggingImage = false;
let startX = 0;
let startY = 0;

const upload = document.getElementById("upload");
const imagem = document.getElementById("imagem");
const texto = document.getElementById("texto");
const inputTexto = document.getElementById("textoInput");
const cor = document.getElementById("cor");
const tamanho = document.getElementById("tamanho");
const canvas = document.getElementById("area");
const zoom = document.getElementById("zoom");

const gh = document.getElementById("gh");
const gv = document.getElementById("gv");

let originalImage = new Image();
let zoomLevel = 1;

function atualizarAltura(aspect) {
  const width = canvas.clientWidth;
  canvas.style.height = (width / aspect) + "px";
}

function setColor(c) {
  texto.style.color = c;
  cor.value = c;
}

upload.addEventListener("change", function() {
  const file = this.files[0];
  if (file) {
    const reader = new FileReader();
  reader.onload = function(e) {

  originalImage.onload = () => {
    imagem.src = e.target.result;
  };

  originalImage.src = e.target.result;
};
    reader.readAsDataURL(file);
  }
});

inputTexto.addEventListener("input", () => {
  texto.textContent = inputTexto.value || "amor";
});

cor.addEventListener("input", () => {
  texto.style.color = cor.value;
});

tamanho.addEventListener("input", () => {
  texto.style.fontSize = tamanho.value + "px";
});

zoom.addEventListener("input", () => {
  zoomLevel = zoom.value;
  updateImageTransform();
});

function updateImageTransform() {
  imagem.style.transform =
    `translate3d(${imgOffsetX}px, ${imgOffsetY}px, 0) scale(${zoomLevel})`;
}

imagem.addEventListener("mousedown", startImageDrag);
imagem.addEventListener("touchstart", startImageDrag);

document.addEventListener("mousemove", dragImage);
document.addEventListener("touchmove", dragImage, { passive: false });

document.addEventListener("mouseup", stopImageDrag);
document.addEventListener("touchend", stopImageDrag);

function startImageDrag(e) {
  if (
    e.target.tagName === "INPUT" &&
    e.target.type === "range"
  ) {
    return;
  }

  e.preventDefault();

  isDraggingImage = true;

  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  const clientY = e.touches ? e.touches[0].clientY : e.clientY;

  startX = clientX - imgOffsetX;
  startY = clientY - imgOffsetY;
}

function dragImage(e) {
  if (!isDraggingImage) return;

  if (
    e.target.tagName !== "INPUT" &&
    e.target.type !== "range"
  ) {
    e.preventDefault();
  }

  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  const clientY = e.touches ? e.touches[0].clientY : e.clientY;

  imgOffsetX = clientX - startX;
  imgOffsetY = clientY - startY;

  updateImageTransform();
}

function stopImageDrag() {
  isDraggingImage = false;
}

function setFormat(event, type) {
  const buttons = document.querySelectorAll(".format-buttons button");
  buttons.forEach(btn => btn.classList.remove("active"));
  event.target.classList.add("active");

  if (type === "square") atualizarAltura(1);
  if (type === "portrait") atualizarAltura(4/5);
  if (type === "story") atualizarAltura(9/16);
}

let isDragging = false;
let offsetX = 0;
let offsetY = 0;

function ativarTexto() {
  texto.classList.add("ativo");
}

function desativarTexto(e) {
  if (!texto.contains(e.target)) {
    texto.classList.remove("ativo");
  }
}

texto.addEventListener("mousedown", ativarTexto);
texto.addEventListener("touchstart", ativarTexto);

document.addEventListener("mousedown", desativarTexto);
document.addEventListener("touchstart", desativarTexto);

function startDrag(e) {
  isDragging = true;
  texto.classList.add("ativo");
  gh.style.display = "block";
  gv.style.display = "block";

  const rect = texto.getBoundingClientRect();
  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  const clientY = e.touches ? e.touches[0].clientY : e.clientY;

  offsetX = clientX - rect.left;
  offsetY = clientY - rect.top;
}

function drag(e) {
  if (!isDragging) return;

  const area = canvas.getBoundingClientRect();
  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  const clientY = e.touches ? e.touches[0].clientY : e.clientY;

  let x = clientX - area.left - offsetX;
  let y = clientY - area.top - offsetY;

  const centerX = canvas.clientWidth / 2;
  const centerY = canvas.clientHeight / 2;

  if (Math.abs(x - centerX) < 15) x = centerX;
  if (Math.abs(y - centerY) < 15) y = centerY;

  texto.style.left = x + "px";
  texto.style.top = y + "px";
  texto.style.transform = "none";
}

function stopDrag() {
  isDragging = false;
  texto.classList.remove("ativo");
  gh.style.display = "none";
  gv.style.display = "none";
}

texto.addEventListener("mousedown", startDrag);
document.addEventListener("mousemove", drag);
document.addEventListener("mouseup", stopDrag);

texto.addEventListener("touchstart", startDrag);
document.addEventListener("touchmove", drag, { passive: false });
document.addEventListener("touchend", stopDrag);

async function baixar() {

if (document.fonts && document.fonts.ready) {
  await document.fonts.ready;
}

  const rect = canvas.getBoundingClientRect();
  const aspect = rect.width / rect.height;

  let w = 2160;
  let h = Math.round(w / aspect);

  const finalCanvas = document.createElement("canvas");
  finalCanvas.width = w;
  finalCanvas.height = h;
  const ctx = finalCanvas.getContext("2d");

  const img = originalImage;
  if (!img.complete || img.naturalWidth === 0) {
  alert("A imagem ainda está carregando.");
  return;
}
  
const imgRatio = img.width / img.height;
const canvasRatio = rect.width / rect.height;

let drawWidth;
let drawHeight;

if (imgRatio > canvasRatio) {

  drawHeight = h * zoomLevel;
  drawWidth = drawHeight * imgRatio;

} else {

  drawWidth = w * zoomLevel;
  drawHeight = drawWidth / imgRatio;

}

const dx = (w - drawWidth) / 2 + (imgOffsetX * (w / rect.width));
const dy = (h - drawHeight) / 2 + (imgOffsetY * (h / rect.height));

ctx.drawImage(
  img,
  dx,
  dy,
  drawWidth,
  drawHeight
);

  const textRect = texto.getBoundingClientRect();
  const areaRect = canvas.getBoundingClientRect();

  const scaleX = w / areaRect.width;
  const scaleY = h / areaRect.height;

  ctx.fillStyle = texto.style.color || "#ffffff";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";

  const fontSize = parseInt(tamanho.value) * scaleX;
  ctx.font = `${fontSize}px Monsieur La Doulaise`;

  const x = (textRect.left - areaRect.left + textRect.width / 2) * scaleX;
  const y = (textRect.top - areaRect.top + textRect.height / 2) * scaleY;

  const lines = texto.textContent.split("\n");
  const lineHeight = fontSize * 0.9;

  lines.forEach((line, i) => {
    ctx.fillText(line, x, y + (i * lineHeight));
});

  finalCanvas.toBlob((blob) => {

  const url = URL.createObjectURL(blob);

  const link = document.createElement("a");

  link.href = url;
  link.download = "arte.png";
  link.style.display = "none";

  document.body.appendChild(link);

  setTimeout(() => {
    link.click();

    document.body.removeChild(link);

    URL.revokeObjectURL(url);
  }, 100);

}, "image/png");
}

// inicia como quadrado correto
window.addEventListener("load", () => atualizarAltura(1));
</script>
