<!DOCTYPE html> 
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="color-scheme" content="light only">
<title>Generator</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Monsieur+La+Doulaise&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
 background: linear-gradient(
  135deg,
  #5f6f7a 0%,
  #7f8f99 25%,
  #aebbc4 50%,
  #d6c7a1 75%,
  #f2e6c9 100%
);
  color: white;
  font-family: 'Cormorant Garamond', serif;

  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;

  gap: 20px;
  padding: 30px 10px;

  min-height: 100dvh;
}

html {
  height: 100%;
}

.container {
  display: flex;
  gap: 30px;
  margin-top: 20px;
  background: rgba(20, 25, 30, 0.55);
  padding: 25px;
  border-radius: 20px;
  backdrop-filter: blur(18px);
  box-shadow: 0 20px 60px rgba(0,0,0,0.4);
} 

.controls {
  display: flex;
  flex-direction: column;
  gap: 16px;
  width: 220px;
}

body {
  background-color: #5f6f7a; /* cor base fixa */
}

html {
  color-scheme: light;
}

html, body {
  height: 100%;
}

* {
  forced-color-adjust: none;
}

.section {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

label {
  font-size: 13px;
  opacity: 0.7;
}

.canvas {
  position: relative;
  width: 400px;
  height: 400px;
  background: #000;
  overflow: hidden;
  border-radius: 14px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.8);
  filter: saturate(1.05) contrast(1.05);
}

.canvas img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transform-origin: center;
}

.texto {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-family: 'Monsieur La Doulaise', cursive;
  font-size: 80px;
  color: white;
  text-align: center;
  cursor: grab;
  user-select: none;
  line-height: 0.9;
  white-space: pre-line;
  text-shadow: 0 0 15px rgba(255, 180, 120, 0.4);
}

.texto.ativo {
  outline: 1.5px dashed rgba(255,255,255,0.5);
  outline-offset: 6px;
  cursor: grabbing;
}

.texto.ativo::after {
  box-shadow: 0 0 20px rgba(255,255,255,0.15);
}

.guia-horizontal,
.guia-vertical {
  position: absolute;
  background: rgba(255,255,255,0.25);
  pointer-events: none;
  display: none;
}

.guia-horizontal {
  top: 50%;
  left: 0;
  width: 100%;
  height: 1px;
}

.guia-vertical {
  left: 50%;
  top: 0;
  width: 1px;
  height: 100%;
}

.color-wrapper {
  display: flex;
  align-items: center;
  gap: 10px;
}

.color-preview {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  cursor: pointer;
  border: 2px solid rgba(255,255,255,0.6);
  background: conic-gradient(
    red,
    orange,
    yellow,
    lime,
    cyan,
    blue,
    violet,
    red
  );
  box-shadow: 0 0 10px rgba(0,0,0,0.3);
  transition: transform 0.2s ease;
}

.color-preview:hover {
  transform: scale(1.08);
}

input[type="color"] {
  width: 100%;
  height: 40px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

input, button {
  padding: 10px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
  font-family: inherit;
}

input[type="range"] {
  accent-color: white;
}

button {
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(10px);
  color: white;
}

button:hover {
  background: rgba(255,255,255,0.25);
}

.format-buttons {
  display: flex;
  gap: 5px;
}

.titulo {
  font-family: 'Monsieur La Doulaise', cursive;
  font-size: 64px;
  margin: 0 0 10px;
  line-height: 0.9;
  letter-spacing: 1px;
}

.titulo {
  transform: scale(1.05);
}

.titulo {
  text-shadow: 0 0 12px rgba(255,255,255,0.15);
}

.format-buttons button {
  flex: 1;
}

.header-box {
  background: rgba(20, 25, 30, 0.6);
  backdrop-filter: blur(14px);

  padding: 14px 18px;
  border-radius: 12px;

  text-align: center;
  color: white;

  box-shadow: 0 10px 30px rgba(0,0,0,0.3);

  width: 100%;
  max-width: 500px; /* acompanha a container */
}

.header-box h1 {
  margin: 0;
  font-size: 16px;
  font-weight: 500;
  letter-spacing: 0.5px;
}

.header-box p {
  margin: 6px 0 0;
  font-size: 12px;
  opacity: 0.8;
  line-height: 1.4;
}

@media (max-width: 768px) {

  .header-box {
    width: 100%;
    max-width: 100%;
    margin-bottom: 10px;
  }

}

.format-buttons button.active {
  background: #444;
}

@media (max-width: 768px) {

 .titulo {
  font-size: 48px;
}

}

@media (max-width: 768px) {

  body {
    align-items: flex-start;
    padding: 15px;
  }

  .container {
    flex-direction: column;
    width: 100%;
    max-width: 500px;
    padding: 15px;
    gap: 20px;
  }

  .controls {
    width: 100%;
  }

  .canvas {
    width: 100%;
  }

  .texto {
    font-size: 60px;
  }
}
</style>
</head>

<body>

<div class="header-box">
  <h1 class="titulo">Sïllas Generator</h1>
  <p>
    envie uma foto.<br>
    escreva seu texto.<br>
    ajuste posição e tamanho.<br>
    escolha o formato.<br>
    baixe sua arte.
  </p>
</div>

<div class="container">

  <div class="controls">

    <div class="section">
      <input type="file" id="upload" accept="image/*">
    </div>

    <div class="section">
      <input type="text" id="textoInput" placeholder="digita aqui">
    </div>

    <div class="section">
      <label>cor do texto</label>
      <div class="color-wrapper">
        <div class="color-preview" onclick="document.getElementById('cor').click()"></div>
        <input type="color" id="cor" value="#ffffff">
      </div>
    </div>

    <div class="section">
      <label>tamanho do texto</label>
      <input type="range" id="tamanho" min="20" max="200" value="80">
    </div>

    <div class="section">
      <label>zoom da imagem</label>
      <input type="range" id="zoom" min="1" max="3" step="0.1" value="1">
    </div>

   <div class="section">
  <label>formato</label>
  <div class="format-buttons">
    <button onclick="setFormat('square')" class="active">quadrado (1:1)</button>
    <button onclick="setFormat('portrait')">retrato (4:5)</button>
    <button onclick="setFormat('story')">story (9:16)</button>
  </div>
</div>

    <button onclick="baixar()">baixar</button>

  </div>

  <div class="canvas" id="area">
    <img id="imagem">
    <div class="guia-horizontal" id="gh"></div>
    <div class="guia-vertical" id="gv"></div>
    <div class="texto" id="texto">amor</div>
  </div>

</div>

<script>
const upload = document.getElementById("upload");
const imagem = document.getElementById("imagem");
const texto = document.getElementById("texto");
const inputTexto = document.getElementById("textoInput");
const cor = document.getElementById("cor");
const tamanho = document.getElementById("tamanho");
const canvas = document.getElementById("area");
const zoom = document.getElementById("zoom");

const gh = document.getElementById("gh");
const gv = document.getElementById("gv");

let originalImage = new Image();
let zoomLevel = 1;

function atualizarAltura(aspect) {
  const width = canvas.clientWidth;
  canvas.style.height = (width / aspect) + "px";
}

upload.addEventListener("change", function() {
  const file = this.files[0];
  if (file) {
    const reader = new FileReader();
    reader.onload = function(e) {
      imagem.src = e.target.result;
      originalImage.src = e.target.result;
    };
    reader.readAsDataURL(file);
  }
});

inputTexto.addEventListener("input", () => {
  texto.textContent = inputTexto.value || "amor";
});

cor.addEventListener("input", () => {
  texto.style.color = cor.value;
});

tamanho.addEventListener("input", () => {
  texto.style.fontSize = tamanho.value + "px";
});

zoom.addEventListener("input", () => {
  zoomLevel = zoom.value;
  imagem.style.transform = `scale(${zoomLevel})`;
});

function setFormat(type) {
  const buttons = document.querySelectorAll(".format-buttons button");
  buttons.forEach(btn => btn.classList.remove("active"));
  event.target.classList.add("active");

  if (type === "square") atualizarAltura(1);
  if (type === "portrait") atualizarAltura(4/5);
  if (type === "story") atualizarAltura(9/16);
}

let isDragging = false;
let offsetX = 0;
let offsetY = 0;

function ativarTexto() {
  texto.classList.add("ativo");
}

function desativarTexto(e) {
  if (!texto.contains(e.target)) {
    texto.classList.remove("ativo");
  }
}

texto.addEventListener("mousedown", ativarTexto);
texto.addEventListener("touchstart", ativarTexto);

document.addEventListener("mousedown", desativarTexto);
document.addEventListener("touchstart", desativarTexto);

function startDrag(e) {
  isDragging = true;
  texto.classList.add("ativo");
  gh.style.display = "block";
  gv.style.display = "block";

  const rect = texto.getBoundingClientRect();
  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  const clientY = e.touches ? e.touches[0].clientY : e.clientY;

  offsetX = clientX - rect.left;
  offsetY = clientY - rect.top;
}

function drag(e) {
  if (!isDragging) return;

  const area = canvas.getBoundingClientRect();
  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  const clientY = e.touches ? e.touches[0].clientY : e.clientY;

  let x = clientX - area.left - offsetX;
  let y = clientY - area.top - offsetY;

  const centerX = canvas.clientWidth / 2;
  const centerY = canvas.clientHeight / 2;

  if (Math.abs(x - centerX) < 15) x = centerX;
  if (Math.abs(y - centerY) < 15) y = centerY;

  texto.style.left = x + "px";
  texto.style.top = y + "px";
  texto.style.transform = "none";
}

function stopDrag() {
  isDragging = false;
  texto.classList.remove("ativo");
  gh.style.display = "none";
  gv.style.display = "none";
}

texto.addEventListener("mousedown", startDrag);
document.addEventListener("mousemove", drag);
document.addEventListener("mouseup", stopDrag);

texto.addEventListener("touchstart", startDrag);
document.addEventListener("touchmove", drag);
document.addEventListener("touchend", stopDrag);

async function baixar() {
  await document.fonts.ready;

  const rect = canvas.getBoundingClientRect();
  const aspect = rect.width / rect.height;

  let w = 1080;
  let h = Math.round(w / aspect);

  const finalCanvas = document.createElement("canvas");
  finalCanvas.width = w;
  finalCanvas.height = h;
  const ctx = finalCanvas.getContext("2d");

  const img = originalImage;
  const imgRatio = img.width / img.height;

  let sx, sy, sw, sh;

  if (imgRatio > aspect) {
    sh = img.height;
    sw = sh * aspect;
    sx = (img.width - sw) / 2;
    sy = 0;
  } else {
    sw = img.width;
    sh = sw / aspect;
    sx = 0;
    sy = (img.height - sh) / 2;
  }

  ctx.drawImage(img, sx, sy, sw, sh, 0, 0, w, h);

  const textRect = texto.getBoundingClientRect();
  const areaRect = canvas.getBoundingClientRect();

  const scaleX = w / areaRect.width;

  ctx.fillStyle = texto.style.color || "#ffffff";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";

  const fontSize = parseInt(tamanho.value) * scaleX;
  ctx.font = `${fontSize}px Monsieur La Doulaise`;

  const x = (textRect.left - areaRect.left + textRect.width / 2) * scaleX;
  const y = (textRect.top - areaRect.top + textRect.height / 2) * scaleX;

  ctx.fillText(texto.textContent, x, y);

  const link = document.createElement("a");
  link.download = "arte.png";
  link.href = finalCanvas.toDataURL("image/png");
  link.click();
}

// inicia como quadrado correto
window.addEventListener("load", () => atualizarAltura(1));
</script>

</body>
</html>
