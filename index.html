<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Generator</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Monsieur+La+Doulaise&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  background: linear-gradient(135deg, #0d0d0d, #1a1a1a);
  color: white;
  font-family: Arial, sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  display: flex;
  gap: 30px;
  background: #111;
  padding: 25px;
  border-radius: 16px;
  box-shadow: 0 0 40px rgba(0,0,0,0.5);
}

.controls {
  display: flex;
  flex-direction: column;
  gap: 12px;
  width: 220px;
}

.section {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.canvas {
  position: relative;
  width: 400px;
  height: 400px;
  background: #000;
  overflow: hidden;
}

.canvas img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.texto {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-family: 'Monsieur La Doulaise', cursive;
  font-size: 80px;
  color: white;
  text-align: center;
  cursor: grab;
  user-select: none;
}

input, button {
  padding: 10px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
}

.format-buttons {
  display: flex;
  gap: 5px;
}

.format-buttons button {
  flex: 1;
  background: #222;
  color: white;
}

.format-buttons button.active {
  background: #555;
}
</style>
</head>

<body>

<div class="container">

  <div class="controls">

    <div class="section">
      <input type="file" id="upload">
    </div>

    <div class="section">
      <input type="text" id="textoInput" placeholder="digita aqui">
    </div>

    <div class="section">
      <label>cor do texto</label>
      <input type="color" id="cor" value="#ffffff">
    </div>

    <div class="section">
      <label>tamanho do texto</label>
      <input type="range" id="tamanho" min="20" max="200" value="80">
    </div>

    <div class="section">
      <label>formato</label>
      <div class="format-buttons">
        <button onclick="setFormat('square')" class="active">1:1</button>
        <button onclick="setFormat('portrait')">4:5</button>
        <button onclick="setFormat('story')">9:16</button>
      </div>
    </div>

    <button onclick="baixar()">baixar</button>

  </div>

  <div class="canvas" id="area">
    <img id="imagem">
    <div class="texto" id="texto">amor</div>
  </div>

</div>

<script>
const upload = document.getElementById("upload");
const imagem = document.getElementById("imagem");
const texto = document.getElementById("texto");
const inputTexto = document.getElementById("textoInput");
const cor = document.getElementById("cor");
const tamanho = document.getElementById("tamanho");
const canvas = document.getElementById("area");

// upload imagem
upload.addEventListener("change", function() {
  const file = this.files[0];
  if (file) {
    const reader = new FileReader();
    reader.onload = function(e) {
      imagem.src = e.target.result;
    };
    reader.readAsDataURL(file);
  }
});

// texto
inputTexto.addEventListener("input", () => {
  texto.textContent = inputTexto.value || "amor";
});

// cor
cor.addEventListener("input", () => {
  texto.style.color = cor.value;
});

// tamanho maior
tamanho.addEventListener("input", () => {
  texto.style.fontSize = tamanho.value + "px";
});

// formatos
function setFormat(type) {
  const buttons = document.querySelectorAll(".format-buttons button");
  buttons.forEach(btn => btn.classList.remove("active"));
  event.target.classList.add("active");

  if (type === "square") {
    canvas.style.width = "400px";
    canvas.style.height = "400px";
  }

  if (type === "portrait") {
    canvas.style.width = "400px";
    canvas.style.height = "500px";
  }

  if (type === "story") {
    canvas.style.width = "400px";
    canvas.style.height = "711px";
  }
}

// drag
let isDragging = false;
let offsetX, offsetY;

function startDrag(e) {
  isDragging = true;
  const rect = texto.getBoundingClientRect();
  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  const clientY = e.touches ? e.touches[0].clientY : e.clientY;

  offsetX = clientX - rect.left;
  offsetY = clientY - rect.top;
}

function drag(e) {
  if (!isDragging) return;

  const area = canvas.getBoundingClientRect();
  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  const clientY = e.touches ? e.touches[0].clientY : e.clientY;

  let x = clientX - area.left - offsetX;
  let y = clientY - area.top - offsetY;

  texto.style.left = x + "px";
  texto.style.top = y + "px";
  texto.style.transform = "none";
}

function stopDrag() {
  isDragging = false;
}

texto.addEventListener("mousedown", startDrag);
document.addEventListener("mousemove", drag);
document.addEventListener("mouseup", stopDrag);

texto.addEventListener("touchstart", startDrag);
document.addEventListener("touchmove", drag);
document.addEventListener("touchend", stopDrag);

// download com proporção correta
function baixar() {
  html2canvas(canvas, {
    scale: 3
  }).then(canvasFinal => {
    const link = document.createElement("a");
    link.download = "arte.png";
    link.href = canvasFinal.toDataURL("image/png");
    link.click();
  });
}
</script>

</body>
</html>
